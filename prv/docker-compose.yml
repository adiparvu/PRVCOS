services:
  # ─── PostgreSQL 16 ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: prv_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prv_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ─── Redis 7 ──────────────────────────────────────────────────────────────
  # Used for rate limiting, caching, and pub/sub.
  # @prv/cache uses Upstash REST API in production; swap DATABASE_URL env
  # below to point at a real Upstash instance when you need full compatibility.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
