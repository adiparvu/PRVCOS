# Supabase local stack configuration
# Requires: Docker Desktop + Supabase CLI (`npm install -g supabase`)
# Start:     supabase start          (first run downloads ~2 GB of images)
# Status:    supabase status         (shows local URLs + keys to paste in .env.local)
# Stop:      supabase stop
# Reset DB:  supabase db reset       (re-applies all migrations from scratch)

[project]
project_id = "prv-local"

[api]
enabled     = true
port        = 54321
schemas     = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows    = 1000

[api.tls]
enabled = false

[db]
port         = 54322
shadow_port  = 54320
major_version = 16

[db.pooler]
enabled = false

[realtime]
enabled                 = true
ip_version              = "IPv6"
heartbeat_interval_ms   = 30000
jwt_claim_validators    = {}

[studio]
enabled     = true
port        = 54323
api_url     = "http://127.0.0.1"

[inbucket]
enabled = true
port    = 54324

[storage]
enabled         = true
file_size_limit = "50MiB"

[auth]
enabled                          = true
site_url                         = "http://127.0.0.1:3000"
additional_redirect_urls         = ["http://127.0.0.1:3000", "http://localhost:3000"]
jwt_expiry                       = 3600
enable_refresh_token_rotation    = true
refresh_token_reuse_interval     = 10
enable_signup                    = true
enable_anonymous_sign_ins        = false
minimum_password_length          = 8
password_requirements            = ""

[auth.email]
enable_signup          = true
double_confirm_changes = true
enable_confirmations   = false

[auth.sms]
enable_signup         = false
enable_confirmations  = false

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[auth.mfa.phone]
enroll_enabled = false
verify_enabled = false

[auth.sessions]
timebox             = "24h"
inactivity_timeout  = "8h"

[edge_runtime]
enabled        = true
policy         = "oneshot"
inspector_port = 8083

[analytics]
enabled = false
