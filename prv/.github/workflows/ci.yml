name: CI

on:
  push:
    branches: [main, "claude/*", "feature/*", "fix/*"]
    paths:
      - "prv/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "prv/**"

defaults:
  run:
    working-directory: prv

env:
  # Stub values for CI — real secrets injected via GitHub Secrets for staging
  NODE_ENV: test
  DATABASE_URL: postgresql://postgres:password@localhost:5432/prv_test
  DATABASE_DIRECT_URL: postgresql://postgres:password@localhost:5432/prv_test
  SUPABASE_SERVICE_ROLE_KEY: ci-stub-service-role-key
  SUPABASE_JWT_SECRET: ci-stub-jwt-secret-min-32-characters
  INNGEST_SIGNING_KEY: signkey-test-ci-stub
  INNGEST_EVENT_KEY: ci-stub-inngest-event-key
  UPSTASH_REDIS_REST_URL: https://ci-stub.upstash.io
  UPSTASH_REDIS_REST_TOKEN: ci-stub-redis-token
  RESEND_API_KEY: re_ci_stub_key
  TYPESENSE_ADMIN_API_KEY: ci-stub-typesense-key
  TYPESENSE_SEARCH_API_KEY: ci-stub-typesense-search-key
  TYPESENSE_HOST: ci-stub.typesense.net
  ANTHROPIC_API_KEY: sk-ant-ci-stub-key
  NEXT_PUBLIC_SUPABASE_URL: https://ci-stub.supabase.co
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-stub-anon-key
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: prv/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: prv/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: prv/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build --filter=@prv/web --filter=@prv/marketing

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: build-artifacts
          path: |
            prv/apps/web/.next
            prv/apps/marketing/.next
          retention-days: 1

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, typecheck]

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: prv_test
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: prv/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm --filter @prv/db db:migrate:run

      - name: Test
        run: pnpm test

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: prv/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high
