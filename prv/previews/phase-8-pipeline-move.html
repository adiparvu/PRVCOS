<!doctype html><html><head><meta charset="utf-8"><title>Move Candidate</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:40px;display:flex;gap:28px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  .col{width:230px}
  h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.35);margin:0 0 12px 2px;font-weight:600}
  .card{border-radius:14px;padding:11px 12px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 rgba(255,255,255,.18)}
  .top{display:flex;align-items:center;gap:6px}
  .nm{font-size:13px;font-weight:640;flex:1}
  .ic{width:22px;height:22px;border-radius:7px;border:1px solid rgba(255,255,255,.12);background:transparent;color:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;font-size:12px}
  .meta{font-size:10.5px;color:rgba(255,255,255,.4);margin-top:5px}
  .sheet{width:340px;background:rgba(28,28,30,0.72);backdrop-filter:blur(48px);border:1px solid rgba(255,255,255,0.12);border-radius:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.16);overflow:hidden}
  .grab{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:10px auto 4px}
  .title{font-size:15px;font-weight:640;padding:6px 20px 2px;text-align:center}
  .hint{font-size:12px;color:rgba(255,255,255,.4);text-align:center;padding:0 20px 8px}
  .body{padding:8px 14px 26px;display:flex;flex-direction:column;gap:6px}
  .st{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);font-size:14px;font-weight:600}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.4)}
  .st.cur{opacity:.4}
  .hired .dot{background:rgba(48,209,88,.9)} .rej .dot{background:rgba(255,69,58,.85)}
</style></head><body>
  <div class="col"><h4>Card — tap ↗ to move</h4>
    <div class="card"><div class="top"><span class="nm">Ana Dumitrescu</span>
      <button class="ic" title="Move">↗</button><button class="ic">×</button></div>
      <div class="meta">★★★★☆ · LinkedIn</div></div>
  </div>
  <div class="col" style="width:340px"><h4>Move sheet</h4>
    <div class="sheet"><div class="grab"></div>
      <div class="title">Move Ana Dumitrescu</div>
      <div class="hint">Currently in Screening</div>
      <div class="body">
        <div class="st"><span class="dot"></span>Sourcing</div>
        <div class="st cur"><span class="dot"></span>Screening · current</div>
        <div class="st"><span class="dot"></span>Phone</div>
        <div class="st"><span class="dot"></span>Interview</div>
        <div class="st"><span class="dot"></span>Assessment</div>
        <div class="st"><span class="dot"></span>Offer</div>
        <div class="st hired"><span class="dot"></span>Hired</div>
        <div class="st rej"><span class="dot"></span>Rejected</div>
      </div>
    </div>
  </div>
</body></html>
