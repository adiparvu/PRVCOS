<!doctype html><html><head><meta charset="utf-8"><title>Shift Staffing</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:40px;display:flex;justify-content:center}
  .sheet{width:360px;background:rgba(28,28,30,0.72);backdrop-filter:blur(48px);border:1px solid rgba(255,255,255,0.12);border-radius:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.16);overflow:hidden}
  .grab{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:10px auto 4px}
  .title{font-size:16px;font-weight:640;padding:8px 20px 0;text-align:center}
  .cap{font-size:12px;color:rgba(255,255,255,.4);text-align:center;padding:2px 20px 10px}
  .body{padding:6px 18px 30px;display:flex;flex-direction:column;gap:8px}
  .who{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09)}
  .av{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .nm{flex:1;font-size:14px;font-weight:600}
  .rm{width:26px;height:26px;border-radius:8px;border:1px solid rgba(255,69,58,.25);background:rgba(255,69,58,.08);color:rgba(255,69,58,.9);font-size:13px}
  .lab{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.35);font-weight:600;margin:10px 2px 2px}
  .add{display:flex;gap:8px}
  select{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:11px;color:rgba(255,255,255,.92);font-size:13.5px}
  .go{background:rgba(48,209,88,.85);color:#00220c;border:none;border-radius:11px;padding:0 18px;font-size:13.5px;font-weight:700}
  .full{font-size:12.5px;color:rgba(48,209,88,.9);text-align:center;padding:8px}
</style></head><body>
  <div class="sheet"><div class="grab"></div><div class="title">Staffing</div>
    <div class="cap">4 of 6 slots filled · 2 open</div>
    <div class="body">
      <div class="who"><div class="av">AI</div><div class="nm">Andrei Ionescu</div><button class="rm">✕</button></div>
      <div class="who"><div class="av">MP</div><div class="nm">Maria Popescu</div><button class="rm">✕</button></div>
      <div class="who"><div class="av">IV</div><div class="nm">Ion Vasile</div><button class="rm">✕</button></div>
      <div class="who"><div class="av">DC</div><div class="nm">Dan Constantin</div><button class="rm">✕</button></div>
      <div class="lab">Add employee</div>
      <div class="add"><select><option>Select an employee…</option><option>Elena Radu · Technician</option></select><button class="go">Add</button></div>
    </div>
  </div>
</body></html>
