<!doctype html><html><head><meta charset="utf-8"><title>Edit Tool</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:40px;display:flex;justify-content:center}
  .sheet{width:360px;background:rgba(28,28,30,0.72);backdrop-filter:blur(48px);border:1px solid rgba(255,255,255,0.12);border-radius:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.16);overflow:hidden}
  .grab{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:10px auto 4px}
  .title{font-size:16px;font-weight:640;padding:8px 20px 4px;text-align:center}
  .body{padding:12px 18px 30px;display:flex;flex-direction:column;gap:14px}
  .lab{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:6px;display:block}
  .in{width:100%;box-sizing:border-box;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;color:rgba(255,255,255,.92);font-size:14px;font-family:inherit}
  textarea{min-height:80px;resize:vertical;line-height:1.5}
  .btns{display:flex;gap:8px;margin-top:4px}
  .go{flex:1;background:#fff;color:#000;border:none;border-radius:11px;padding:12px;font-size:13.5px;font-weight:700}
  .cancel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);border-radius:11px;padding:12px 20px;font-size:13.5px;font-weight:600}
</style></head><body>
  <div class="sheet"><div class="grab"></div><div class="title">Edit Tool</div>
    <div class="body">
      <div><span class="lab">Store / location</span><select class="in"><option>Unassigned</option><option selected>Depozit Central · Bucureşti</option><option>Şantier Nord</option></select></div>
      <div><span class="lab">Notes</span><textarea class="in" placeholder="Condition, accessories, remarks…">Case + 2 spare batteries. Calibrated 03/2026.</textarea></div>
      <div class="btns"><button class="go">Save changes</button><button class="cancel">Cancel</button></div>
    </div>
  </div>
</body></html>
