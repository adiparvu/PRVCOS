<!doctype html><html><head><meta charset="utf-8"><title>Share Document</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:40px;display:flex;justify-content:center}
  .sheet{width:360px;background:rgba(28,28,30,0.72);backdrop-filter:blur(48px);border:1px solid rgba(255,255,255,0.12);border-radius:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.16);overflow:hidden}
  .grab{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:10px auto 4px}
  .title{font-size:16px;font-weight:640;padding:8px 20px 2px;text-align:center}
  .body{padding:12px 18px 30px;display:flex;flex-direction:column;gap:14px}
  .lab{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:6px;display:block}
  select{width:100%;box-sizing:border-box;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;color:rgba(255,255,255,.92);font-size:13.5px;font-family:inherit}
  .perms{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
  .chip.on{background:rgba(10,132,255,.9);border-color:transparent;color:#fff}
  .btns{display:flex;gap:8px;margin-top:4px}
  .go{flex:1;background:rgba(10,132,255,.9);color:#fff;border:none;border-radius:11px;padding:12px;font-size:13.5px;font-weight:700}
  .cancel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);border-radius:11px;padding:12px 20px;font-size:13.5px;font-weight:600}
  .hint{font-size:12px;color:rgba(255,255,255,.4);line-height:1.5}
</style></head><body>
  <div class="sheet">
    <div class="grab"></div>
    <div class="title">Share Document</div>
    <div class="body">
      <div class="hint">Grant a colleague access to this document. They will find it in their shared documents.</div>
      <div><span class="lab">Share with</span>
        <select><option>Select a colleague…</option><option>Maria Popescu · Project Manager</option><option>Andrei Ionescu · Site Lead</option></select></div>
      <div><span class="lab">Permission</span>
        <div class="perms"><span class="chip on">View</span><span class="chip">Download</span><span class="chip">Edit</span><span class="chip">Manage</span></div></div>
      <div class="btns"><button class="go">Share</button><button class="cancel">Cancel</button></div>
    </div>
  </div>
</body></html>
