<!doctype html><html><head><meta charset="utf-8"><title>Lead → Convert</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:40px;display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
  .col{width:340px}
  h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.35);margin:0 0 12px 2px;font-weight:600}
  .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.2);margin-bottom:14px}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;margin-bottom:12px;background:rgba(48,209,88,.13);color:rgba(48,209,88,.95)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .q{padding:11px;border-radius:12px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.11);display:flex;flex-direction:column;align-items:center;gap:5px;color:rgba(255,255,255,.65);font-size:11px;font-weight:600}
  .convert{width:100%;box-sizing:border-box;padding:13px;border-radius:12px;background:#fff;border:none;color:#000;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
  .hint{font-size:11.5px;color:rgba(255,255,255,.4);line-height:1.5;margin:8px 2px 0}
</style></head><body>
  <div class="col">
    <h4>Won lead → convert to customer</h4>
    <div class="card">
      <span class="badge">● Won</span>
      <div class="grid">
        <div class="q">Call</div><div class="q">Email</div>
        <div class="q">Create quote</div><div class="q" style="opacity:.4">— terminal —</div>
      </div>
      <button class="convert">Convert to client →</button>
      <div class="hint">Promotes this prospect to an active customer (same record, history preserved) and opens the client profile.</div>
    </div>
  </div>
</body></html>
