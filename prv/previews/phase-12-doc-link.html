<!doctype html><html><head><meta charset="utf-8"><title>Share Link</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:36px;display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  .col{width:340px}
  h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.35);margin:0 0 12px 2px;font-weight:600}
  .sheet{background:rgba(28,28,30,0.72);backdrop-filter:blur(48px);border:1px solid rgba(255,255,255,0.12);border-radius:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.16);overflow:hidden}
  .grab{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:10px auto 4px}
  .title{font-size:16px;font-weight:640;padding:8px 20px 4px;text-align:center}
  .body{padding:12px 18px 30px;display:flex;flex-direction:column;gap:14px}
  .lab{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.4);font-weight:600;margin-bottom:6px;display:block}
  .seg{display:flex;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:3px;gap:3px}
  .seg button{flex:1;border:none;background:transparent;color:rgba(255,255,255,.6);font-size:13px;font-weight:600;padding:9px;border-radius:9px}
  .seg button.on{background:rgba(255,255,255,.14);color:#fff}
  .perms{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:rgba(255,255,255,.7)}
  .chip.on{background:rgba(10,132,255,.9);border-color:transparent;color:#fff}
  select,.row{width:100%;box-sizing:border-box}
  select{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:11px;color:rgba(255,255,255,.92);font-size:13.5px}
  .row{display:flex;align-items:center;justify-content:space-between;font-size:13.5px;color:rgba(255,255,255,.8)}
  .tog{width:42px;height:25px;border-radius:100px;background:rgba(10,132,255,.9);position:relative}
  .tog::after{content:"";position:absolute;top:2px;right:2px;width:21px;height:21px;border-radius:50%;background:#fff}
  .go{width:100%;background:rgba(10,132,255,.9);color:#fff;border:none;border-radius:11px;padding:12px;font-size:13.5px;font-weight:700}
  .link{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;font-size:12px;color:rgba(126,184,255,.95);word-break:break-all;font-family:ui-monospace,monospace}
  .copy{background:#fff;color:#000;border:none;border-radius:11px;padding:12px;font-size:13.5px;font-weight:700;width:100%}
</style></head><body>
  <div class="col"><h4>Share sheet — Link mode</h4>
    <div class="sheet"><div class="grab"></div><div class="title">Share Document</div>
      <div class="body">
        <div class="seg"><button>Person</button><button class="on">Link</button></div>
        <div><span class="lab">Permission</span><div class="perms"><span class="chip on">View</span><span class="chip">Download</span><span class="chip">Edit</span><span class="chip">Manage</span></div></div>
        <div><span class="lab">Expires</span><select><option>Never</option><option>In 7 days</option><option>In 30 days</option></select></div>
        <div class="row"><span>Password protected</span><div class="tog"></div></div>
        <button class="go">Create link</button>
      </div>
    </div>
  </div>
  <div class="col"><h4>Link created</h4>
    <div class="sheet"><div class="grab"></div><div class="title">Share Link Ready</div>
      <div class="body">
        <div style="font-size:12px;color:rgba(255,255,255,.4);line-height:1.5">Anyone with this link can view the document per the permission you set.</div>
        <div class="link">https://prv.app/api/share/9f3aK2xq7Lm4vB8nP0rT6wZ</div>
        <button class="copy">Copy link</button>
      </div>
    </div>
  </div>
</body></html>
