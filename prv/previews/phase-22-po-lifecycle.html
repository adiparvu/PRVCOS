<!doctype html><html><head><meta charset="utf-8"><title>PO Lifecycle Actions</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:36px;display:flex;gap:24px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  .col{width:340px}
  h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.35);margin:0 0 10px 2px;font-weight:600}
  .card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:16px;margin-bottom:16px;box-shadow:inset 0 1px 0 rgba(255,255,255,.2)}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;margin-bottom:12px}
  .row{display:flex;gap:10px}
  .btn{flex:1;padding:14px;border-radius:14px;font-size:14px;font-weight:700;cursor:pointer;text-align:center;border:none}
  .approve{flex:2;background:rgba(48,209,88,.85);color:#000}
  .reject{background:rgba(255,69,58,.15);border:1px solid rgba(255,69,58,.25);color:rgba(255,69,58,.95)}
  .submit{background:#fff;color:#000}
  .receive{background:rgba(255,159,10,.9);color:#000}
  /* reject sheet */
  .sheet{width:340px;background:rgba(28,28,30,0.72);backdrop-filter:blur(48px);border:1px solid rgba(255,255,255,0.12);border-radius:32px 32px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.18);overflow:hidden}
  .grab{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:10px auto 4px}
  .title{font-size:16px;font-weight:640;padding:8px 20px 4px;text-align:center}
  .body{padding:8px 16px 30px;display:flex;flex-direction:column;gap:12px}
  textarea{width:100%;box-sizing:border-box;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;color:rgba(255,255,255,.92);font-size:13.5px;min-height:80px}
  .sbtn{padding:10px 18px;border:0;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
  .sred{background:rgba(255,69,58,.92);color:#fff}
  .sghost{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75)}
</style></head><body>
  <div class="col">
    <h4>Lifecycle CTAs by status</h4>
    <div class="card"><span class="badge" style="background:rgba(255,255,255,.12);color:rgba(255,255,255,.8)">Draft</span>
      <div class="row"><div class="btn submit">Submit for approval</div></div></div>
    <div class="card"><span class="badge" style="background:rgba(255,159,10,.13);color:rgba(255,159,10,.95)">Pending</span>
      <div class="row"><div class="btn reject">Reject</div><div class="btn approve">Approve Comanda</div></div></div>
    <div class="card"><span class="badge" style="background:rgba(48,209,88,.13);color:rgba(48,209,88,.95)">Approved / In Transit</span>
      <div class="row"><div class="btn receive">Mark received</div></div></div>
    <div class="card"><span class="badge" style="background:rgba(48,209,88,.13);color:rgba(48,209,88,.95)">Received</span>
      <div style="font-size:12.5px;color:rgba(255,255,255,.4)">Terminal — no actions. Lifecycle complete.</div></div>
  </div>
  <div class="col">
    <h4>Reject → reason sheet</h4>
    <div class="sheet">
      <div class="grab"></div>
      <div class="title">Reject Purchase Order</div>
      <div class="body">
        <div style="font-size:12px;color:rgba(255,255,255,.4);line-height:1.5">Add a reason. It is recorded on the PO and in the audit log.</div>
        <textarea placeholder="Reason for rejection…"></textarea>
        <div style="display:flex;gap:8px">
          <button class="sbtn sred">Confirm rejection</button>
          <button class="sbtn sghost">Cancel</button>
        </div>
      </div>
    </div>
  </div>
</body></html>
