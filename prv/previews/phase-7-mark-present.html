<!doctype html><html><head><meta charset="utf-8"><title>Mark Present</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:40px;display:flex;justify-content:center}
  .sheet{width:360px;background:rgba(28,28,30,0.72);backdrop-filter:blur(48px);border:1px solid rgba(255,255,255,0.12);border-radius:28px;box-shadow:inset 0 1px 0 rgba(255,255,255,.16);overflow:hidden}
  .grab{width:36px;height:5px;border-radius:3px;background:rgba(255,255,255,.22);margin:10px auto 4px}
  .title{font-size:16px;font-weight:640;padding:8px 20px 0;text-align:center}
  .cap{font-size:12px;color:rgba(255,255,255,.4);text-align:center;padding:2px 20px 10px}
  .body{padding:6px 18px 30px;display:flex;flex-direction:column;gap:8px}
  .who{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09)}
  .av{width:32px;height:32px;border-radius:9px;background:rgba(255,255,255,.10);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
  .nm{flex:1;font-size:14px;font-weight:600}
  .mark{border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.06);color:rgba(255,255,255,.8);font-size:12.5px;font-weight:600;border-radius:9px;padding:7px 12px}
  .ok{display:flex;align-items:center;gap:5px;color:rgba(48,209,88,.95);font-size:12.5px;font-weight:600}
  .all{margin-top:8px;background:rgba(48,209,88,.85);color:#00220c;border:none;border-radius:11px;padding:12px;font-size:13.5px;font-weight:700}
</style></head><body>
  <div class="sheet"><div class="grab"></div><div class="title">Mark Present</div>
    <div class="cap">2 of 4 present · shift 14 Jul, 07:30–16:00</div>
    <div class="body">
      <div class="who"><div class="av">AI</div><div class="nm">Andrei Ionescu</div><div class="ok">✓ Present</div></div>
      <div class="who"><div class="av">MP</div><div class="nm">Maria Popescu</div><div class="ok">✓ Present</div></div>
      <div class="who"><div class="av">IV</div><div class="nm">Ion Vasile</div><button class="mark">Mark present</button></div>
      <div class="who"><div class="av">DC</div><div class="nm">Dan Constantin</div><button class="mark">Mark present</button></div>
      <button class="all">Mark all present</button>
    </div>
  </div>
</body></html>
