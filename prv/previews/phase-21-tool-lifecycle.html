<!doctype html><html><head><meta charset="utf-8"><title>Tool Lifecycle</title>
<style>
  body{margin:0;background:#000;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;color:#fff;-webkit-font-smoothing:antialiased;padding:36px;display:flex;gap:26px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
  .col{width:340px}
  h4{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:rgba(255,255,255,.35);margin:0 0 12px 2px;font-weight:600}
  .sheet{background:rgba(28,28,30,0.72);backdrop-filter:blur(48px);border:1px solid rgba(255,255,255,0.12);border-radius:24px;box-shadow:inset 0 1px 0 rgba(255,255,255,.16);overflow:hidden;padding:8px}
  .row{display:flex;align-items:center;gap:12px;padding:12px;border-radius:14px;margin:4px;background:rgba(255,255,255,.04)}
  .ic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
  .lbl{font-size:14.5px;font-weight:600}
  .sub{font-size:12px;color:rgba(255,255,255,.4);margin-top:2px}
  .blue .ic{background:rgba(10,132,255,.18)} .blue .lbl{color:rgba(10,132,255,.95)}
  .amber .ic{background:rgba(255,159,10,.18)} .amber .lbl{color:rgba(255,159,10,.95)}
  .green .ic{background:rgba(48,209,88,.16)} .green .lbl{color:rgba(48,209,88,.95)}
  .red .ic{background:rgba(255,69,58,.16)} .red .lbl{color:rgba(255,69,58,.95)}
  select,.confirm,.cancel{width:100%;box-sizing:border-box;font-family:inherit}
  .body{padding:12px 14px 22px;display:flex;flex-direction:column;gap:12px}
  select{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:12px;padding:12px;color:rgba(255,255,255,.92);font-size:13.5px}
  .btns{display:flex;gap:8px}
  .confirm{background:rgba(10,132,255,.9);color:#fff;border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600}
  .cancel{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.75);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600}
</style></head><body>
  <div class="col">
    <h4>Action sheet — status-aware</h4>
    <div class="sheet">
      <div class="row blue"><div class="ic">＋</div><div><div class="lbl">Assign</div><div class="sub">Assign to an employee</div></div></div>
      <div class="row amber"><div class="ic">🔧</div><div><div class="lbl">Trimite la Service</div><div class="sub">Move to maintenance</div></div></div>
      <div class="row green"><div class="ic">✓</div><div><div class="lbl">Mark Returned</div><div class="sub">Retur de la Andrei I.</div></div></div>
      <div class="row red"><div class="ic">⦸</div><div><div class="lbl">Mark Missing</div><div class="sub">Lost or stolen tool</div></div></div>
    </div>
  </div>
  <div class="col">
    <h4>Assign → people picker</h4>
    <div class="sheet" style="border-radius:24px">
      <div class="body">
        <div style="font-size:12px;color:rgba(255,255,255,.4);line-height:1.5">Assign this tool to an employee. It moves to <b>In&nbsp;Use</b> under their name.</div>
        <select><option>Select an employee…</option><option>Andrei Ionescu · Technician</option><option>Maria Popescu · Foreman</option></select>
        <div class="btns"><button class="confirm">Assign tool</button><button class="cancel">Cancel</button></div>
      </div>
    </div>
  </div>
</body></html>
